[Service]
# ProtectHome=tmpfs (main unit) hides all of /home from the hermes process.
# Bind the shared vault back in read-only so the plugin can read the whole
# vault, then re-bind Hermes's own subtree read-write. ACLs (u:hermes:rwX on
# agents/hermes) remain the kernel-level backstop.
BindReadOnlyPaths=/home/dbexpertai/obsidian-vault
BindPaths=/home/dbexpertai/obsidian-vault/agents/hermes
ReadWritePaths=/home/dbexpertai/obsidian-vault/agents/hermes
