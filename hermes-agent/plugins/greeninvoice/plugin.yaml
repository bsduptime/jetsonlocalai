name: greeninvoice
version: 0.1.0
description: |
  Draft, retrieve, and issue GreenInvoice (Morning) documents, and manage the
  clients they bill. All policy — per-action rate limits, the issue/send
  confirmation gate, credential custody — lives in the privilege-separated
  hermes-greeninvoice daemon; this plugin is a thin Unix-socket client and
  never sees the API key.

  Workflow: gi_draft_invoice renders a PREVIEW (nothing is recorded, no email
  is sent) so you can show it to David. gi_issue_invoice creates a REAL,
  irreversible document and is rate-limited (3/hour, 10/day) and requires an
  explicit confirm flag. Issuing can also email the client when asked. Clients
  can be created/updated but never deleted. Dry-run is the default until David
  flips GI_DRY_RUN=false with sandbox or production credentials in place.
author: David Klippel
provides_tools:
  - gi_draft_invoice
  - gi_issue_invoice
  - gi_get_document
  - gi_search_documents
  - gi_document_download_links
  - gi_create_client
  - gi_update_client
  - gi_get_client
  - gi_search_clients
  - gi_quota
